name: Build & Release APK

# Triggers when you push a tag like v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # Decode the keystore from the GitHub secret
      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      # Build the signed release APK
      # lintVitalAnalyzeRelease is neutered in build.gradle.kts (AGP registers it as a
      # Gradle finalizer task so -x and enabled=false are both bypassed; we clear its
      # actions instead so it always succeeds).
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-configuration-cache
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      # Upload the APK as a GitHub Release asset
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: "Release ${{ github.ref_name }}"
          body: |
            ## SimpleMacroTracking ${{ github.ref_name }}
            Download the APK below and install it on your Android device.
            > **Note:** You may need to enable "Install from unknown sources" in your device settings.

